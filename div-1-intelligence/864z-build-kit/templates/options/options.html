<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{APP_NAME}} Settings</title>
  <link rel="stylesheet" href="../lib/aether-ui.css">
</head>
<body>
  <div class="options-container">
    <!-- Brand Header -->
    <header class="brand-header">
      <div class="brand-logo">
        <span class="brand-864">864</span><span class="brand-zeros">zeros</span>
      </div>
      <h1>{{APP_NAME}} Settings</h1>
    </header>

    <main class="options-content p-xl">
      <!-- Security Settings -->
      <section class="card mt-lg">
        <h3>Security</h3>
        <div class="form-group mt-md">
          <label class="form-label">Auto-lock timeout</label>
          <select id="auto-lock-timeout">
            <option value="5">5 minutes</option>
            <option value="15" selected>15 minutes</option>
            <option value="30">30 minutes</option>
            <option value="60">1 hour</option>
            <option value="0">Never (not recommended)</option>
          </select>
        </div>
      </section>

      <!-- Data Management -->
      <section class="card mt-lg">
        <h3>Data</h3>
        <div class="btn-group mt-md">
          <button class="btn btn-secondary" id="export-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Export Vault
          </button>
          <button class="btn btn-danger" id="reset-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
            Reset Vault
          </button>
        </div>
      </section>

      <!-- Upgrade Section -->
      <section class="card mt-lg upgrade-card">
        <div class="upgrade-header">
          <h3>Upgrade to Pro</h3>
          <span class="badge badge-info">Save $48/year vs Dashlane</span>
        </div>
        <p class="text-secondary mt-sm">
          Unlock cross-device sync, automated backups, and priority support.
        </p>
        <button class="btn btn-primary mt-md" id="upgrade-btn">
          View Pricing
        </button>
      </section>

      <!-- Trust Banner -->
      <div class="trust-banner mt-xl">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Your data never leaves your device
      </div>
    </main>

    <!-- Standard 864zeros Footer -->
    <footer class="brand-footer">
      <div class="footer-brand">
        <span class="footer-864">864</span><span class="footer-zeros">zeros</span>
      </div>
      <div class="footer-links">
        <a href="https://864zeros.com/privacy" target="_blank" rel="noopener">Privacy</a>
        <span class="footer-divider">·</span>
        <a href="https://864zeros.com/terms" target="_blank" rel="noopener">Terms</a>
        <span class="footer-divider">·</span>
        <a href="https://864zeros.com/support" target="_blank" rel="noopener">Support</a>
      </div>
      <div class="footer-copyright">© 2026 864zeros LLC. All rights reserved.</div>
    </footer>
  </div>

  <!-- Pricing Modal (BRK-PRICING-001) -->
  <div class="pricing-modal hidden" id="pricing-modal"></div>

  <script type="module" src="./options.js"></script>
</body>
</html>
