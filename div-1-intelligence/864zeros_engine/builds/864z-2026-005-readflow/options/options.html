<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadFlow Settings</title>
  <link rel="stylesheet" href="../lib/aether-ui.css">
</head>
<body>
  <div class="options-container p-xl">
    <h1>ReadFlow Settings</h1>

    <div class="card mt-lg">
      <h3>Reading</h3>
      <div class="form-group mt-md">
        <label class="form-label">Words per minute (reading speed)</label>
        <select id="reading-speed">
          <option value="150">Slow (150 wpm)</option>
          <option value="200" selected>Average (200 wpm)</option>
          <option value="250">Fast (250 wpm)</option>
          <option value="300">Speed reader (300 wpm)</option>
        </select>
      </div>
    </div>

    <div class="card mt-lg">
      <h3>Kobo Sync</h3>
      <div class="form-group mt-md">
        <label class="form-label">Default digest format</label>
        <select id="digest-format">
          <option value="epub" selected>ePub (Recommended)</option>
          <option value="pdf">PDF</option>
        </select>
      </div>
    </div>

    <div class="card mt-lg">
      <h3>Data</h3>
      <button class="btn btn-secondary mt-md" id="export-btn">Export Library</button>
      <button class="btn btn-danger mt-sm" id="reset-btn">Reset Library</button>
    </div>

    <div class="trust-banner mt-xl">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      Your data never leaves your device
    </div>
  </div>

  <script type="module" src="./options.js"></script>
</body>
</html>
