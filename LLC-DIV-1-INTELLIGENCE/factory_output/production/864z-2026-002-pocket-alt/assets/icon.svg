<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- ReadVault Icon - 864zeros Build Kit -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#grad)"/>
  <!-- Vault/Book Icon -->
  <g fill="white">
    <!-- Book spine -->
    <rect x="32" y="28" width="8" height="72" rx="2"/>
    <!-- Book pages -->
    <path d="M44 32 h44 a4 4 0 0 1 4 4 v56 a4 4 0 0 1 -4 4 h-44 z"/>
    <!-- Page lines -->
    <rect x="52" y="44" width="32" height="4" rx="1" fill="#6366f1" opacity="0.4"/>
    <rect x="52" y="56" width="28" height="4" rx="1" fill="#6366f1" opacity="0.4"/>
    <rect x="52" y="68" width="32" height="4" rx="1" fill="#6366f1" opacity="0.4"/>
    <rect x="52" y="80" width="20" height="4" rx="1" fill="#6366f1" opacity="0.4"/>
  </g>
  <!-- Lock/Privacy indicator -->
  <circle cx="98" cy="98" r="18" fill="white"/>
  <g fill="#22c55e">
    <rect x="90" y="94" width="16" height="12" rx="2"/>
    <path d="M92 94 v-4 a6 6 0 0 1 12 0 v4" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
