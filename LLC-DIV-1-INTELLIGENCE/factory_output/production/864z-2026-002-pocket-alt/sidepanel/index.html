<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadVault</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../lib/oia-design-system.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="oia-screen">
    <!-- Header -->
    <header class="oia-header">
      <h1 class="oia-h1">ReadVault</h1>
      <div class="header-actions">
        <button id="btn-import" class="oia-btn-secondary" title="Import from Pocket">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 0a.5.5 0 0 1 .5.5v5.793l2.146-2.147a.5.5 0 0 1 .708.708l-3 3a.5.5 0 0 1-.708 0l-3-3a.5.5 0 1 1 .708-.708L7.5 6.293V.5A.5.5 0 0 1 8 0z"/>
            <path d="M0 8a.5.5 0 0 1 .5-.5h15a.5.5 0 0 1 0 1H.5A.5.5 0 0 1 0 8z"/>
          </svg>
          Import
        </button>
        <button id="btn-settings" class="oia-btn-icon" title="Settings">
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/>
            <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <span id="stat-total">0 articles</span>
      <span class="stat-divider">|</span>
      <span id="stat-unread">0 unread</span>
    </div>

    <!-- Filter/Search -->
    <div class="search-bar">
      <input type="text" id="search-input" class="oia-input" placeholder="Search articles...">
      <select id="filter-status" class="oia-select">
        <option value="all">All</option>
        <option value="unread">Unread</option>
        <option value="archived">Archived</option>
        <option value="favorites">Favorites</option>
      </select>
    </div>

    <!-- Article List -->
    <div id="article-list" class="article-list">
      <div class="empty-state">
        <p class="oia-body">No articles yet.</p>
        <p class="oia-body-small">Save articles with the context menu or import from Pocket.</p>
        <button id="btn-import-empty" class="oia-btn-primary">Import from Pocket</button>
      </div>
    </div>

    <!-- Footer -->
    <footer class="oia-footer">
      <span class="footer-brand">ReadVault by 864zeros</span>
      <span class="footer-privacy">100% Offline-First</span>
    </footer>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
