<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReadFlow</title>
  <link rel="stylesheet" href="../lib/aether-ui.css">
</head>
<body>
  <div class="app-container" id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="app-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span>ReadFlow</span>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost" id="import-btn" title="Import">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
        <button class="btn btn-ghost" id="lock-btn" title="Lock">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="app-content" id="main-content">
      <div class="search-container">
        <input type="text" class="search-input" placeholder="Search..." id="search-input">
      </div>

      <div id="content-list"></div>

      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h3>Your vault is empty</h3>
        <p class="text-secondary">Import from Instapaper or add entries manually.</p>
        <button class="btn btn-primary" id="start-import-btn">
          Import from Instapaper
        </button>
      </div>
    </main>

    <!-- Trust Footer -->
    <footer class="trust-footer">
      <div class="trust-badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Your data never leaves your device
      </div>
    </footer>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
