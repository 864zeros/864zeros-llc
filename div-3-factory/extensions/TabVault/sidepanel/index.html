<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabVault</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../lib/oia-design-system.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header -->
  <header class="panel-header">
    <h1 class="oia-h2">TabVault</h1>
    <button class="panel-header__settings" id="open-options" title="Settings" aria-label="Open settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- Main Content -->
  <main class="panel-content">
    <!-- Vault View (default) -->
    <section id="view-vault" class="panel-view active">
      <div class="panel-actions oia-section">
        <button id="captureCurrentTab" class="oia-btn oia-btn-primary" style="width: 100%;">
          Vault Current Tab
        </button>
        <button id="captureAllTabs" class="oia-btn oia-btn-secondary" style="width: 100%; margin-top: var(--oia-space-sm);">
          Vault All Tabs
        </button>
      </div>

      <!-- Search Bar -->
      <div class="search-bar oia-section">
        <input type="search" id="vaultSearch" class="oia-input" placeholder="Search vaulted tabs..." autocomplete="off">
      </div>

      <div class="panel-vault oia-section">
        <h2 class="oia-h3 oia-mb-sm">Vaulted Tabs <span id="vaultCount" class="vault-count"></span></h2>
        <div id="vaultedTabsList"></div>
        <div id="emptyState" class="oia-empty">
          <div class="oia-empty__icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <p class="oia-empty__headline">Your vault is ready</p>
          <p class="oia-empty__subtext">Click a button above to save your first tab</p>
        </div>
      </div>
    </section>

    <!-- Sleep View -->
    <section id="view-sleep" class="panel-view">
      <div class="panel-actions oia-section">
        <button id="sleepAllTabs" class="oia-btn oia-btn-primary" style="width: 100%;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px;">
            <path d="M2 12h2"/><path d="M6 6l1.5 1.5"/><path d="M12 2v2"/>
          </svg>
          Sleep All Tabs
        </button>
        <button id="sleepExceptActive" class="oia-btn oia-btn-secondary" style="width: 100%; margin-top: var(--oia-space-sm);">
          Sleep All Except Active
        </button>
      </div>

      <div class="panel-sleep oia-section">
        <div class="sleep-header">
          <h2 class="oia-h3 oia-mb-sm">Open Tabs <span id="openTabsCount" class="vault-count"></span></h2>
          <span id="memoryIndicator" class="memory-indicator"></span>
        </div>
        <div id="openTabsList"></div>
        <div id="sleepEmptyState" class="oia-empty" style="display: none;">
          <div class="oia-empty__icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/>
            </svg>
          </div>
          <p class="oia-empty__headline">All tabs are sleeping</p>
          <p class="oia-empty__subtext">Memory optimized. Your browser is running light.</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Privacy Footer -->
  <footer class="privacy-footer">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    <span>Your data stays on your device. No tracking.</span>
  </footer>

  <!-- Bottom Navigation -->
  <nav class="oia-bottom-nav panel-nav" aria-label="Main navigation">
    <button class="oia-bottom-nav__item oia-bottom-nav__item--active" data-view="vault" aria-current="page">
      <svg class="oia-bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <span class="oia-bottom-nav__label">Vault</span>
    </button>
    <button class="oia-bottom-nav__item" data-view="sleep">
      <svg class="oia-bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/>
      </svg>
      <span class="oia-bottom-nav__label">Sleep</span>
    </button>
  </nav>

  <script type="module" src="main.js"></script>
</body>
</html>
