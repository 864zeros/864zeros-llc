<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TuneOut2FocusIn</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../lib/oia-design-system.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="panel">
    <!-- Header -->
    <header class="panel-header">
      <h1 class="oia-h2">Tune Out 2 Focus In</h1>
      <button class="panel-header__settings" id="openSettings" title="Settings" aria-label="Open settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Main Content -->
    <main class="panel-content">
      <!-- Toggle Button -->
      <section class="toggle-section">
        <button id="toggleBtn" class="oia-btn oia-btn-primary toggle-btn" aria-label="Start or stop sound playback">
          Start Sound
        </button>
      </section>

      <!-- Sound Selection -->
      <section class="sounds-section">
        <h2 class="oia-body-sm sounds-label">Choose your sound</h2>
        <div class="sounds-grid">
          <button id="btnWhiteNoise" class="sound-btn" data-sound="white_noise" aria-label="White Noise - all frequencies">
            <span class="sound-btn__icon">
              <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="4" y1="10" x2="4" y2="18"/><line x1="7" y1="8" x2="7" y2="20"/>
                <line x1="10" y1="11" x2="10" y2="17"/><line x1="13" y1="6" x2="13" y2="22"/>
                <line x1="16" y1="9" x2="16" y2="19"/><line x1="19" y1="7" x2="19" y2="21"/>
                <line x1="22" y1="10" x2="22" y2="18"/><line x1="25" y1="12" x2="25" y2="16"/>
              </svg>
            </span>
            <span class="sound-btn__label">White Noise</span>
          </button>
          <button id="btnGrayNoise" class="sound-btn" data-sound="gray_noise" aria-label="Gray Noise - balanced frequencies">
            <span class="sound-btn__icon">
              <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="4" y1="12" x2="4" y2="16"/><line x1="8" y1="9" x2="8" y2="19"/>
                <line x1="12" y1="11" x2="12" y2="17"/><line x1="16" y1="8" x2="16" y2="20"/>
                <line x1="20" y1="10" x2="20" y2="18"/><line x1="24" y1="12" x2="24" y2="16"/>
              </svg>
            </span>
            <span class="sound-btn__label">Gray Noise</span>
          </button>
          <button id="btnBrownNoise" class="sound-btn" data-sound="brown_noise" aria-label="Brown Noise - deep low frequencies">
            <span class="sound-btn__icon">
              <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="6" y1="11" x2="6" y2="17"/><line x1="11" y1="7" x2="11" y2="21"/>
                <line x1="16" y1="9" x2="16" y2="19"/><line x1="21" y1="6" x2="21" y2="22"/>
              </svg>
            </span>
            <span class="sound-btn__label">Brown Noise</span>
          </button>
          <button id="btnRain" class="sound-btn" data-sound="rain" aria-label="Rain - gentle rainfall">
            <span class="sound-btn__icon">
              <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M7 8 L5 14"/><path d="M12 6 L10 12"/><path d="M17 9 L15 15"/>
                <path d="M22 7 L20 13"/><path d="M9 15 L7 21"/><path d="M14 14 L12 20"/>
                <path d="M19 16 L17 22"/><path d="M24 14 L22 20"/>
              </svg>
            </span>
            <span class="sound-btn__label">Rain</span>
          </button>
        </div>
      </section>

      <!-- Volume Control -->
      <section class="volume-section">
        <div class="volume-header">
          <label for="volumeSlider" class="oia-body-sm volume-label">Volume</label>
          <span id="volumeValue" class="oia-body-sm volume-value">50%</span>
        </div>
        <input type="range" id="volumeSlider" class="oia-slider volume-slider" min="0" max="100" value="50">
      </section>

      <!-- Status Display -->
      <section class="status-section">
        <div class="status-indicator" id="statusIndicator"></div>
        <p id="statusDisplay" class="oia-body-sm status-text">Sound Off</p>
      </section>
    </main>

    <!-- Footer -->
    <footer class="panel-footer">
      <p class="oia-caption">Built for people with ADHD by someone with ADHD</p>
      <p class="oia-caption" style="font-style: italic; color: var(--oia-sage);">Scientifically proven to help me</p>
    </footer>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
