<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Insights - Content Swap Test</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg: #0f0f0f; --panel: #1a1a1a; --gold: #ffd700; --text: #eee; --dim: #888;
        }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; }
        
        /* Sidebar for Testing */
        #test-controls { width: 280px; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn { background: #333; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; text-align: left; }
        .btn:hover { background: #444; border-left: 3px solid var(--gold); }
        .btn.active { background: #222; border-left: 3px solid var(--gold); }

        /* Main Explorer Panel */
        #explorer { flex: 1; display: flex; flex-direction: column; }
        #map { height: 45%; border-bottom: 2px solid #333; }
        #dashboard { flex: 1; overflow-y: auto; padding: 20px; }

        /* UI Components */
        .rail { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .pill { background: var(--panel); padding: 10px; border-radius: 5px; border: 1px solid #333; }
        .pill label { font-size: 0.6rem; color: var(--dim); display: block; text-transform: uppercase; }
        .pill span { font-size: 0.9rem; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .card { background: var(--panel); border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .card img { width: 100%; height: 90px; object-cover: cover; background: #222; }
        .card-body { padding: 10px; }
        .card-body h4 { margin: 0; font-size: 0.8rem; color: var(--gold); }
        .card-body p { margin: 5px 0 0; font-size: 0.7rem; color: var(--dim); line-height: 1.2; }

        .narrative { background: #151515; padding: 15px; border-radius: 5px; border-left: 3px solid var(--gold); margin-top: 20px; }
        .quote { font-style: italic; color: #ccc; font-size: 0.85rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <section id="test-controls">
        <h3>📍 Location Swap</h3>
        <button class="btn active" onclick="updateSite('Abel-beth-maacah', this)">
            <b>2 Sam 20:15</b><br>Abel-beth-maacah
        </button>
        <button class="btn" onclick="updateSite('Tel-Hazor', this)">
            <b>Joshua 11:10</b><br>Tel Hazor
        </button>
    </section>

    <section id="explorer">
        <div id="map"></div>
        <div id="dashboard">
            <div class="rail">
                <div class="pill"><label>Elevation</label><span id="stat-elev">--</span></div>
                <div class="pill"><label>Geopolitics</label><span id="stat-geo">--</span></div>
                <div class="pill"><label>Era</label><span id="stat-era">--</span></div>
            </div>

            <div class="grid" id="artifact-grid">
                </div>

            <div class="narrative">
                <div class="quote" id="nar-quote">Select a location...</div>
                <div style="font-size: 0.8rem; color: var(--dim);" id="nar-insight">--</div>
            </div>
        </div>
    </section>

    <script>
        const siteData = {
            "Abel-beth-maacah": {
                lat: 33.267, lng: 35.580, elev: "350m", geo: "ISR vs ARM", era: "Divided Monarchy",
                quote: "And they came and besieged him in Abel-beth-maacah...",
                insight: "A strategic hinge city saved by a wise woman's negotiation.",
                finds: [
                    {t: "Mystery Head", d: "9th-c. BCE Faience", img: "https://images.squarespace-cdn.com/content/v1/5689728b25981d39b33a5585/1531310196726-0R218L64N03WAK184P5D/image-asset.jpeg"},
                    {t: "Silver Hoard", d: "3,000-year-old currency", img: "https://www.abel-beth-maacah.org/uploads/1/7/8/0/17805167/9719597_orig.jpg"},
                    {t: "Cultic Stones", d: "Iron Age ritual space", img: "https://www.abel-beth-maacah.org/uploads/1/7/8/0/17805167/2012019_orig.jpg"}
                ]
            },
            "Tel-Hazor": {
                lat: 33.016, lng: 35.568, elev: "230m", geo: "ISR vs CAN", era: "Joshua's Conquest",
                quote: "Joshua at that time turned back, and took Hazor...",
                insight: "The 'Head of all Kingdoms'—ten times larger than Jerusalem.",
                finds: [
                    {t: "Solomonic Gate", d: "6-Chambered Fortress Gate", img: "https://www.biblewalks.com/hazor/photos/HazorGate1.jpg"},
                    {t: "Canaanite Palace", d: "Site of violent ash layer", img: "https://www.biblewalks.com/hazor/photos/HazorPalace1.jpg"},
                    {t: "Sphinx Fragment", d: "Rare Egyptian artifact", img: "https://www.bibleplaces.com/wp-content/uploads/2015/10/Hazor-Sphinx-fragment-bp.jpg"}
                ]
            }
        };

        let map = L.map('map').setView([33.267, 35.580], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = L.marker([33.267, 35.580]).addTo(map);

        function updateSite(id, btn) {
            const data = siteData[id];
            
            // 1. Map Update
            map.flyTo([data.lat, data.lng], 14, { duration: 1.5 });
            marker.setLatLng([data.lat, data.lng]);

            // 2. Stats Update
            document.getElementById('stat-elev').innerText = data.elev;
            document.getElementById('stat-geo').innerText = data.geo;
            document.getElementById('stat-era').innerText = data.era;
            document.getElementById('nar-quote').innerText = data.quote;
            document.getElementById('nar-insight').innerText = data.insight;

            // 3. Card Injection
            const grid = document.getElementById('artifact-grid');
            grid.innerHTML = data.finds.map(f => `
                <div class="card">
                    <img src="${f.img}" alt="${f.t}">
                    <div class="card-body">
                        <h4>${f.t}</h4>
                        <p>${f.d}</p>
                    </div>
                </div>
            `).join('');

            // UI Styling
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // Init
        updateSite('Abel-beth-maacah', document.querySelector('.btn.active'));
    </script>
</body>
</html>
