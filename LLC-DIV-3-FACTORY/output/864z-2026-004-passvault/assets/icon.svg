<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- PassVault Icon - Minimalist Shield/Vault -->
  <!-- Security-green on dark background -->

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#0a0a0f"/>

  <!-- Shield outline -->
  <path
    d="M64 12 L108 28 L108 58 C108 88 88 108 64 116 C40 108 20 88 20 58 L20 28 Z"
    fill="none"
    stroke="#00d084"
    stroke-width="4"
    stroke-linejoin="round"
  />

  <!-- Lock body -->
  <rect
    x="44" y="58"
    width="40" height="32"
    rx="4"
    fill="#00d084"
  />

  <!-- Lock shackle -->
  <path
    d="M52 58 L52 48 C52 38 56 32 64 32 C72 32 76 38 76 48 L76 58"
    fill="none"
    stroke="#00d084"
    stroke-width="6"
    stroke-linecap="round"
  />

  <!-- Keyhole -->
  <circle cx="64" cy="70" r="5" fill="#0a0a0f"/>
  <path d="M64 73 L64 82" stroke="#0a0a0f" stroke-width="4" stroke-linecap="round"/>
</svg>
