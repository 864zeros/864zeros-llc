<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oia.focus.note</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="panel.css">
</head>
<body>
    <div class="oia-screen" id="container">
        <header class="oia-header">
            <h1 class="oia-h1">oia.focus.note</h1>
        </header>

        <div class="oia-section">
            <label for="brainDump" class="oia-label">what do you need to remember?</label>
            <textarea
                id="brainDump"
                class="oia-input"
                placeholder="let your thoughts flow..."
            ></textarea>
        </div>

        <div class="oia-actions">
            <button class="oia-btn oia-btn-primary" id="saveButton">save</button>
            <button class="oia-btn oia-btn-secondary oia-btn-icon" id="copyButton" aria-label="copy all notes">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="m5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
            </button>
            <button class="oia-btn oia-btn-secondary oia-btn-icon" id="downloadButton" aria-label="download notes">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7,10 12,15 17,10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
            </button>
        </div>

        <div class="oia-notes-section">
            <div class="oia-notes-label">notes</div>
            <div id="notesContainer" class="oia-notes-container">
                <!-- Notes will be dynamically inserted here -->
            </div>
        </div>

        <footer class="oia-footer">
            made for adhd minds &#8226; <a href="https://864zeros.com" target="_blank" rel="noopener">864zeros.com</a>
        </footer>
    </div>

    <script type="module" src="panel.js"></script>
</body>
</html>
