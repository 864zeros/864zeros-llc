<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chronicle</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../lib/oia-design-system.css">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div id="app" class="chronicle-app">
    <!-- Header -->
    <header class="chronicle-header">
      <div class="header-left">
        <h1 class="oia-h1">
          <span class="brand-prefix brand-prefix--oia">[OIA]</span>
          Chronicle
        </h1>
        <span id="entry-count" class="oia-caption">0 entries</span>
      </div>
      <div class="header-actions">
        <!-- Sovereign Link: Liberate Vault (two-tap arm; per RULE-005) -->
        <button id="liberate-btn" class="oia-btn oia-btn-secondary header-liberate" title="Liberate Vault — export all conversations as JSON">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
        </button>
        <button id="settings-btn" class="oia-btn oia-btn-secondary header-settings" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Toast (Sovereign Link arm + status messages) -->
    <div id="panel-toast" class="panel-toast hidden" role="status" aria-live="polite"></div>

    <!-- Search -->
    <div class="oia-section">
      <input type="search" id="search" class="oia-input" placeholder="Search conversations..." autocomplete="off">
    </div>

    <!-- Filter tabs -->
    <div class="filter-tabs oia-gap-sm">
      <button class="oia-badge oia-badge--completed active" data-filter="all">All</button>
      <button class="oia-badge oia-badge--pending" data-filter="gemini">Gemini</button>
      <button class="oia-badge oia-badge--pending" data-filter="claude">Claude</button>
      <button class="oia-badge oia-badge--pending" data-filter="chatgpt">ChatGPT</button>
      <button class="oia-badge oia-badge--in-progress" data-filter="starred">Starred</button>
    </div>

    <!-- Entry list -->
    <main id="entries" class="entries-list">
      <!-- Entries rendered here -->
    </main>

    <!-- Empty state -->
    <div id="empty" class="oia-empty hidden">
      <div class="oia-empty__headline">No conversations yet</div>
      <div class="oia-empty__subtext">Visit Gemini to start recording.</div>
    </div>

    <!-- Entry detail view -->
    <div id="detail" class="detail-view hidden">
      <div class="detail-header">
        <button id="back-btn" class="oia-btn oia-btn-secondary detail-back">&larr;</button>
        <h2 id="detail-title" class="oia-h2">Entry</h2>
        <button id="star-btn" class="oia-btn oia-btn-secondary detail-star">&#9734;</button>
      </div>
      <div id="detail-content" class="detail-content">
        <!-- Exchanges rendered here -->
      </div>
      <div class="detail-footer">
        <span id="detail-meta" class="oia-caption"></span>
        <button id="delete-btn" class="oia-btn oia-btn-secondary detail-delete">Delete</button>
      </div>
    </div>

    <!-- Settings & destructive actions now live in the Options page (RULE-001).
         Settings cog opens it via chrome.runtime.openOptionsPage(). -->
  </div>

  <script src="panel.js"></script>
</body>
</html>
